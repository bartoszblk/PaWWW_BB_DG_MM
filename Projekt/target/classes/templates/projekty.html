<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Lista Projektów</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #ffffff; color: #000000; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000000; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; font-weight: bold; }
        a { color: #0000ee; text-decoration: underline; font-weight: bold; }
        .table-container {
            overflow-x: auto;
            max-width: 100%;
        }

        .opis-col {
            max-width: 400px;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
<h1>System Budżetu Obywatelskiego</h1>
<a th:href="@{/projekty/nowy}">Dodaj nowy projekt</a>

<div class="table-container">
    <table>
        <thead>
        <tr>
            <th>Tytuł</th>
            <th class="opis-col">Opis</th>
            <th>Osiedle</th>
            <th>Koszt (PLN)</th>
            <th>Kategoria</th>
            <th>Data rozpoczęcia</th>
            <th>Typ głosowania</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${listaProjektow}">
            <td th:text="${p.title}"></td>
            <td class="opis-col" th:text="${p.description}"></td>
            <td th:text="${p.osiedle.nazwa}"></td>
            <td th:text="${p.szacowanyKoszt}"></td>
            <td th:text="${p.kategoria.nazwa}"></td>
            <td th:text="${p.dataRozpoczecia}"></td>
            <td th:text="${p.czyTajne == 1 ? 'Tajne' : 'Jawne'}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
