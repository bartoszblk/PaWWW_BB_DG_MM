<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zgłoś Projekt</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #ffffff; color: #000000; padding: 20px; }

        .form-container { max-width: 600px; margin: 0 auto; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }

        input, textarea, select { padding: 8px; border: 1px solid #000000; box-sizing: border-box; }

        .wide-input { width: 100%; max-width: 450px; }

        .narrow-input { width: 100%; max-width: 250px; }

        .error { color: #d90000; font-weight: bold; font-size: 0.9em; display: block; margin-top: 5px; }
        button { padding: 10px 20px; background-color: #3634a8; color: #ffffff; font-weight: bold; border: none; cursor: pointer; margin-right: 15px; }
        a { color: #000000; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h1>Formularz zgłoszeniowy</h1>

    <form th:action="@{/projekty/nowy}" th:object="${projekt}" method="post">

        <div class="form-group">
            <label for="title">Tytuł projektu:</label>
            <input type="text" id="title" class="wide-input" th:field="*{title}" required minlength="5" maxlength="150" aria-describedby="titleError"/>
            <span id="titleError" class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
        </div>

        <div class="form-group">
            <label for="description">Opis projektu:</label>
            <textarea id="description" class="wide-input" th:field="*{description}" rows="5" required minlength="10" aria-describedby="descError"></textarea>
            <span id="descError" class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
        </div>

        <div class="form-group">
            <label for="osiedle">Osiedle:</label>
            <select id="osiedle" class="narrow-input" th:field="*{osiedle}" required aria-describedby="osiedleError">
                <option value="">Wybierz osiedle</option>
                <option th:each="os : ${listaOsiedli}" th:value="${os.idOsiedla}" th:text="${os.nazwa}"></option>
            </select>
            <span id="osiedleError" class="error" th:if="${#fields.hasErrors('osiedle')}" th:errors="*{osiedle}"></span>
        </div>

        <div class="form-group">
            <label for="szacowanyKoszt">Koszt projektu (PLN):</label>
            <input type="number" id="szacowanyKoszt" class="narrow-input" th:field="*{szacowanyKoszt}" required min="1" step="0.01" aria-describedby="kosztError"/>
            <span id="kosztError" class="error" th:if="${#fields.hasErrors('szacowanyKoszt')}" th:errors="*{szacowanyKoszt}"></span>
        </div>

        <div class="form-group">
            <label for="dataRozpoczecia">Data rozpoczęcia:</label>
            <input type="date" id="dataRozpoczecia" class="narrow-input" th:field="*{dataRozpoczecia}" required aria-describedby="dataError"/>
            <span id="dataError" class="error" th:if="${#fields.hasErrors('dataRozpoczecia')}" th:errors="*{dataRozpoczecia}"></span>
        </div>

        <div class="form-group">
            <label for="czyTajne">Tryb głosowania:</label>
            <select id="czyTajne" class="narrow-input" th:field="*{czyTajne}">
                <option value="0">Jawne</option>
                <option value="1">Tajne</option>
            </select>
        </div>

        <div class="form-group">
            <label for="kategoria">Kategoria:</label>
            <select id="kategoria" class="narrow-input" th:field="*{kategoria}" required aria-describedby="kategoriaError">
                <option value="">>>> Wybierz kategorię <<<</option>
                <option th:each="kat : ${listaKategorii}" th:value="${kat.idKategorii}" th:text="${kat.nazwa}"></option>
            </select>
            <span id="kategoriaError" class="error" th:if="${#fields.hasErrors('kategoria')}" th:errors="*{kategoria}"></span>
        </div>

        <button type="submit">Zapisz projekt</button>
        <a th:href="@{/projekty}">Anuluj</a>
    </form>
</div>

</body>
</html>
