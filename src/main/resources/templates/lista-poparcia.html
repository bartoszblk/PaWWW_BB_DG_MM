<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Lista Poparcia</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #ffffff; color: #000000; }
        h1, h3 { text-align: center; color: #3634a8; }
        table { width: 100%; max-width: 600px; margin: 20px auto; border-collapse: collapse; }
        th, td { border: 1px solid #000000; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; font-weight: bold; }
        .btn { padding: 10px 15px; font-weight: bold; border-radius: 4px; text-decoration: none; border: 1px solid #000000; display: inline-block; cursor: pointer; }
        .btn-primary { background-color: #3634a8; color: #ffffff; }
    </style>
</head>
<body>

<h1>Jawna lista poparcia</h1>
<h3 th:text="'Projekt: ' + ${projekt.title}"></h3>

<div style="text-align: center; margin-bottom: 20px;">
    <a th:href="@{/projekty}" class="btn btn-primary">Wróć do listy projektów</a>
</div>

<div th:if="${#lists.isEmpty(glosy)}" style="text-align: center; font-weight: bold; margin-top: 20px;">
    Nikt jeszcze nie oddał głosu na ten projekt.
</div>

<table th:unless="${#lists.isEmpty(glosy)}">
    <thead>
    <tr>
        <th>Imię i nazwisko obywatela</th>
        <th>Data oddania głosu</th>
        <th>Decyzja</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="g : ${glosy}">
        <td th:text="${g.uzytkownik.imie + ' ' + g.uzytkownik.nazwisko}"></td>
        <td th:text="${#temporals.format(g.dataOddania, 'yyyy-MM-dd HH:mm')}"></td>
        <td th:text="${g.rodzajGlosu}" th:style="${g.rodzajGlosu == 'ZA' ? 'color: green; font-weight: bold;' : 'color: red; font-weight: bold;'}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
